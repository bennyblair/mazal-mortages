<!-- Hidden file for Netlify form detection. These forms are rendered by React at runtime. -->
<form name="referral-enquiry" netlify netlify-honeypot="bot-field" hidden>
  <input name="firstName" />
  <input name="lastName" />
  <input name="email" type="email" />
  <input name="phone" type="tel" />
  <input name="suburb" />
  <input name="state" />
  <input name="enquiryType" />
  <input name="bot-field" />
</form>
<form name="contact" netlify netlify-honeypot="bot-field" hidden>
  <input name="name" />
  <input name="email" type="email" />
  <input name="phone" type="tel" />
  <input name="loanType" />
  <textarea name="message"></textarea>
  <input name="bot-field" />
</form>
